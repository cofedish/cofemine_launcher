name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (vX.Y.Z)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build JAR + wrappers (Linux)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    env:
      MAVEN_CENTRAL_REPO: https://repo1.maven.org/maven2/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve tag
        id: resolve
        shell: bash
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: 'jdk+fx'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: never
      - name: Prepare signing key
        shell: bash
        run: |
          if [ -n "${{ secrets.HMCL_SIGNATURE_KEY_B64 }}" ]; then
            echo "${{ secrets.HMCL_SIGNATURE_KEY_B64 }}" | base64 -d > "$RUNNER_TEMP/hmcl-sign.key"
            echo "HMCL_SIGNATURE_KEY=$RUNNER_TEMP/hmcl-sign.key" >> "$GITHUB_ENV"
          fi
      - name: Build with Gradle
        run: ./gradlew build --no-daemon --parallel
        env:
          MICROSOFT_AUTH_ID: ${{ secrets.MICROSOFT_AUTH_ID }}
          MICROSOFT_AUTH_SECRET: ${{ secrets.MICROSOFT_AUTH_SECRET }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          HMCL_LAUNCHER_EXE: tools/HMCLauncher.exe
      - name: Generate update metadata
        shell: bash
        run: |
          JAR_PATH=$(ls HMCL/build/libs/CofeMine-Launcher-*.jar | head -n 1)
          SHA1_PATH="$JAR_PATH.sha1"
          VERSION="${{ steps.resolve.outputs.tag }}"
          VERSION="${VERSION#v}"
          SHA1=$(cat "$SHA1_PATH" | tr -d '\r\n')
          JAR_NAME=$(basename "$JAR_PATH")
          cat > HMCL/build/libs/update.json <<EOF
          {"version":"$VERSION","jar":"https://github.com/cofedish/cofemine_launcher/releases/download/${{ steps.resolve.outputs.tag }}/$JAR_NAME","jarsha1":"$SHA1","force":false}
          EOF
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: CofeMine ${{ steps.resolve.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            HMCL/build/libs/CofeMine-Launcher-*.jar
            HMCL/build/libs/CofeMine-Launcher-*.jar.sha256
            HMCL/build/libs/CofeMine-Launcher.exe
            HMCL/build/libs/CofeMine-Launcher.exe.sha256
            HMCL/build/libs/CofeMine-Launcher.sh
            HMCL/build/libs/CofeMine-Launcher.sh.sha256
            HMCL/build/libs/update.json

  installers:
    name: Installer (${{ matrix.os }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            kind: windows
            asset_glob: 'HMCL/build/installer/*.exe'
            asset_ext: exe
          - os: macos-latest
            kind: macos
            asset_glob: 'HMCL/build/installer/*.dmg'
            asset_ext: dmg
          - os: ubuntu-latest
            kind: linux
            asset_glob: 'HMCL/build/installer/*.deb HMCL/build/installer/*.rpm'
            asset_ext: deb
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: 'jdk+fx'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # --- Icon generation: produces platform-specific icons from hmcl.png ---

      - name: Generate Windows .ico
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          # GitHub windows-latest ships ImageMagick as `magick`.
          magick HMCL/image/hmcl.png -define icon:auto-resize=16,24,32,48,64,128,256 HMCL/image/hmcl.ico

      - name: Generate macOS .icns
        if: matrix.kind == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          ICONSET=HMCL/image/hmcl.iconset
          mkdir -p "$ICONSET"
          SRC=HMCL/image/hmcl.png
          sips -z 16 16     "$SRC" --out "$ICONSET/icon_16x16.png"        >/dev/null
          sips -z 32 32     "$SRC" --out "$ICONSET/icon_16x16@2x.png"     >/dev/null
          sips -z 32 32     "$SRC" --out "$ICONSET/icon_32x32.png"        >/dev/null
          sips -z 64 64     "$SRC" --out "$ICONSET/icon_32x32@2x.png"     >/dev/null
          sips -z 128 128   "$SRC" --out "$ICONSET/icon_128x128.png"      >/dev/null
          sips -z 256 256   "$SRC" --out "$ICONSET/icon_128x128@2x.png"   >/dev/null
          sips -z 256 256   "$SRC" --out "$ICONSET/icon_256x256.png"      >/dev/null
          # hmcl.png is 256x256 — upscales for the remaining sizes are lossy
          # but acceptable for a launcher icon. Replace with a higher-res
          # source later if a crisper result is needed.
          sips -z 512 512   "$SRC" --out "$ICONSET/icon_256x256@2x.png"   >/dev/null
          sips -z 512 512   "$SRC" --out "$ICONSET/icon_512x512.png"      >/dev/null
          sips -z 1024 1024 "$SRC" --out "$ICONSET/icon_512x512@2x.png"   >/dev/null
          iconutil -c icns "$ICONSET" -o HMCL/image/hmcl.icns

      # --- Build shadowJar then invoke platform-specific jpackage task ---

      - name: Build shadowJar
        shell: bash
        run: ./gradlew :HMCL:shadowJar --no-daemon
        env:
          MICROSOFT_AUTH_ID: ${{ secrets.MICROSOFT_AUTH_ID }}
          MICROSOFT_AUTH_SECRET: ${{ secrets.MICROSOFT_AUTH_SECRET }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Build Windows installer
        if: matrix.kind == 'windows'
        shell: pwsh
        run: ./gradlew :HMCL:packageInstallerWindows --no-daemon

      - name: Build macOS installer
        if: matrix.kind == 'macos'
        shell: bash
        run: ./gradlew :HMCL:packageInstallerMac --no-daemon

      - name: Build Linux installers
        if: matrix.kind == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm
          ./gradlew :HMCL:packageInstallerLinuxDeb :HMCL:packageInstallerLinuxRpm --no-daemon

      - name: List installer artifacts
        shell: bash
        run: ls -la HMCL/build/installer/

      - name: Upload installer assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            HMCL/build/installer/*.exe
            HMCL/build/installer/*.msi
            HMCL/build/installer/*.dmg
            HMCL/build/installer/*.pkg
            HMCL/build/installer/*.deb
            HMCL/build/installer/*.rpm
            HMCL/build/installer/*.sha256
          fail_on_unmatched_files: false
